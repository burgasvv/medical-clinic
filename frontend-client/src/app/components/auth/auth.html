<div>
    <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com"
                   ngModel #emailInput="ngModel" required email [class.is-invalid]="loginForm.submitted && emailInput.invalid">
        </div>
        <label for="inputPassword5" class="form-label">Password</label>
        <input type="password" name="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock"
               ngModel #passwordInput="ngModel" required minlength="6" [class.is-invalid]="loginForm.submitted && passwordInput.invalid">
        <div id="passwordHelpBlock" class="form-text">
            Your password must be 8-20 characters long, contain letters and numbers, and must not contain spaces, special characters, or emoji.
        </div>
        <button type="submit">Войти</button>
    </form>
</div>
